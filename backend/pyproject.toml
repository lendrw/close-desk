[tool.ruff]
line-length = 88
target-version = "py312"
src = ["accounts", "config", "tickets", "tests"]
extend-exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
